name: Build Windows App

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch: # Enable manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: 'policyevaluationGOS/package-lock.json'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # caching pip dependencies

    - name: Build Python Backend
      working-directory: ./document_ocr_api
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        python build_backend.py

    - name: Copy Backend to Frontend Resources
      shell: pwsh
      run: |
        $BackendSrc = "./document_ocr_api/dist/backend"
        $ResourcesDir = "./policyevaluationGOS/resources"
        $BackendDest = "$ResourcesDir/backend"
        
        if (-not (Test-Path $ResourcesDir)) {
            New-Item -ItemType Directory -Force -Path $ResourcesDir | Out-Null
        }
        
        Copy-Item -Path $BackendSrc -Destination $BackendDest -Recurse

    - name: Install Frontend Dependencies
      working-directory: ./policyevaluationGOS
      run: npm ci

    - name: Build and Package Electron App
      working-directory: ./policyevaluationGOS
      run: npm run electron:build
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Required for electron-builder to publish if configured

    - name: Upload Windows Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PolicyEval-GOS-Windows-Installer
        path: policyevaluationGOS/release/*.exe
